version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zx_advisor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    environment:
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  celery-worker:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A celery_app worker --loglevel=info -Q default,rag,crm -c 4"
    volumes:
      - ./:/app
    environment:
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      - postgres
      - redis

  celery-beat:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A celery_app beat --loglevel=info"
    volumes:
      - ./:/app
    environment:
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
  redis_data:
