# Neo4j 知识图谱配置
# 部署方式: Docker部署
# 启动命令: docker run -d --name neo4j -p 7474:7474 -p 7687:7687 -e NEO4J_AUTH=neo4j/password neo4j:5.15-community

neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "password"
  database: "neo4j"
  max_connection_lifetime: 3600
  max_connection_pool_size: 50
