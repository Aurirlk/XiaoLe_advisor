# 联网搜索配置
# provider: 搜索源（duckduckgo / metaso / tavily）
# DuckDuckGo 免费无需 Key，Metaso/Tavily 需要 API Key

web_search:
  provider: duckduckgo
  top_k: 5
  search_timeout_seconds: 4
  fetch_timeout_seconds: 8
  max_content_bytes: 512000
  cache_ttl_hours: 24
  user_agent: "Mozilla/5.0 (compatible; ZXAIAdvisor/1.0)"
  enable_page_fetch: true
  vector_collection: zx_web_cache
  max_chroma_text_chars: 2000
  synthesis_excerpt_chars: 800
  fetch_concurrency: 3

  # 秘塔搜索（推荐，国内可用，结果质量高）
  # 申请地址：https://metaso.cn/search-api/api-keys
  metaso:
    api_key: "${METASO_API_KEY}"
    base_url: https://api.metaso.cn/api/open/search

  # Tavily（海外搜索，需科学上网）
  # 申请地址：https://app.tavily.com/home
  tavily:
    api_key: "${TAVILY_API_KEY}"
    base_url: https://api.tavily.com/search
