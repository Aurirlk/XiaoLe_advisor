patches:
  - trigger_tags:
      - 太端水
      - 建议没用
    inject: "用户反馈你之前回答过于含糊。本次必须给出明确冲/稳/保判断，禁止'建议再考虑'。"
  - trigger_tags:
      - 数据不准
    inject: "用户质疑数据准确性。仅引用 sql_results 中的数字，无数据时明确说查不到。"
  - trigger_tags:
      - 没回答我的问题
    inject: "用户反馈未正面回答问题。请先直接回应用户原问题，再展开分析。"
  - trigger_tags:
      - 路由错了
    inject: "用户认为上一轮路由不当。请聚焦用户核心诉求，避免答非所问。"
