<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZX AI Advisor — 智能报考顾问系统</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x1f393;</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="app">
    <app-layout></app-layout>
  </div>

  <script type="module">
    import AppLayout from './components/AppLayout.js'
    import ChatContainer from './components/ChatContainer.js'
    import SidePanel from './components/SidePanel.js'
    import MessageBubble from './components/MessageBubble.js'
    import StatusIndicator from './components/StatusIndicator.js'
    import ProfileCard from './components/ProfileCard.js'
    import QuickChips from './components/QuickChips.js'
    
    const { createApp } = Vue
    
    const app = createApp({
      components: {
        AppLayout
      }
    })
    
    app.component('ChatContainer', ChatContainer)
    app.component('SidePanel', SidePanel)
    app.component('MessageBubble', MessageBubble)
    app.component('StatusIndicator', StatusIndicator)
    app.component('ProfileCard', ProfileCard)
    app.component('QuickChips', QuickChips)
    
    app.mount('#app')
  </script>
</body>
</html>
